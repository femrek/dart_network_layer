name: example_project
description: "An example project to demonstrate the usage of dart_network_layer_dio package."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  dart_network_layer_dio:
    path: ../dart_network_layer_dio
  dio: ^5.9.2
  flutter:
    sdk: flutter
  openapi:
    path: modules/openapi
  path_provider: ^2.1.5

dev_dependencies:
  build_runner: ^2.12.2
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true
