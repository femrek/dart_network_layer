name: Dart Test and Prepare Release

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*' # Release tags for the bundle package
  pull_request:
    branches: [ "main" ]

jobs:
  # Analyze the source code then run the tests
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1

      # Install dependencies for each package
      - name: Install dependencies for core
        run: dart pub get --no-example -C dart_network_layer_core
      - name: Install dependencies for dio impl
        run: dart pub get --no-example -C dart_network_layer_dio

      # Verify that the libraries are error-free
      - name: Verify formatting for core
        run: dart format --output=none --set-exit-if-changed dart_network_layer_core/lib
      - name: Verify formatting for dio impl
        run: dart format --output=none --set-exit-if-changed dart_network_layer_dio/lib

      # Analyze the source code
      - name: Analyze project source for core
        run: dart analyze dart_network_layer_core/lib
      - name: Analyze project source for dio impl
        run: dart analyze dart_network_layer_dio/lib

      # Run tests
      - name: Run tests for core
        run: cd dart_network_layer_core && dart test
      - name: Run tests for dio implementation
        run: cd dart_network_layer_dio && dart test

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed for creating GitHub Releases

    steps:
      - uses: actions/checkout@v6

      - name: Verify version matches tag
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          PUBSPEC_VERSION=$(grep '^version: ' pubspec.yaml | sed "s/^version: //" | tr -d " '\"")
          
          if [ "$TAG_VERSION" != "$PUBSPEC_VERSION" ]; then
            echo "Error: Git tag version ($TAG_VERSION) does not match pubspec.yaml version ($PUBSPEC_VERSION)"
            exit 1
          fi
          echo "Version match verified: $TAG_VERSION"


      - name: Extract Release Notes
        id: extract_notes
        run: |
          # Extracts the latest release block from CHANGELOG.md (from the first '## ' up to the next '## ')
          awk '/^## /{ if (p) { exit }; p=1; next } p{ print }' CHANGELOG.md > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release_notes.md
